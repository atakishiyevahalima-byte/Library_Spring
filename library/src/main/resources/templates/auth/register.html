<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
</head>
<body>
<a th:href="@{?lang=en}">EN</a>
<a th:href="@{?lang=ru}">RU</a>
<a th:href="@{?lang=az}">AZ</a>
  <h2 th:text="#{app.register}"></h2>
  <form th:action="@{register}" th:object="${form}" method="post">
      <div>
          <label th:text="#{book.username}"></label>
          <input type="text" th:field="*{username}">
          <div style="color: red;" th:field="${#fields.hasErrors('username')}" th:errors="*{username}"></div>
      </div>
      <div>
          <label th:text="#{book.password}"></label>
          <input type="password" th:field="*{password}">
          <div style="color: red;" th:field="${#fields.hasErrors('password')}" th:errors="*{password}"></div>
      </div>
      <div>
          <label th:text="#{book.confirmpassword}"></label>
          <input type="password" th:field="*{confirmPassword}">
          <div style="color: red;" th:field="${#fields.hasErrors('confirmPassword')}" th:errors="*{confirmPassword}"></div>
      </div>

      <button type="submit" th:text="#{button.createaccount}"></button>
  </form>

  <p>
    <a th:href="@{/login}" th:text="#{button.backtologin}"></a>
  </p>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #667eea, #764ba2);
        margin: 0;
        height: 100vh;

        display: flex;
        flex-direction: column;   /* всё по вертикали */
        justify-content: center;  /* по центру по высоте */
        align-items: center;      /* по центру по ширине */
    }

    h2 {
        color: white;
        margin-bottom: 20px;
        text-align: center;
    }

    form {
        background: white;
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        width: 380px;
    }

    form div {
        margin-bottom: 18px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: #444;
    }

    input {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1px solid #ccc;
        font-size: 14px;
        transition: 0.3s;
    }

    input:focus {
        border-color: #667eea;
        box-shadow: 0 0 8px rgba(102, 126, 234, 0.4);
        outline: none;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background-color: #667eea;
        color: white;
        font-size: 15px;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background-color: #5a67d8;
    }

    p {
        margin-top: 15px;
        text-align: center;
    }

    a {
        color: white;
        text-decoration: none;
        font-weight: 600;
    }

    a:hover {
        text-decoration: underline;
    }
</style>
</body>
</html>
